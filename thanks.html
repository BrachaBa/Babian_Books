<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תודה רבה - לכתוב את חייך מחדש</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700&family=Frank+Ruhl+Libre:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { 800: '#0f172a', 900: '#020617' },
                        gold: { 400: '#FBBF24', 500: '#D4AF37' }
                    },
                    fontFamily: {
                        sans: ['Heebo', 'sans-serif'],
                        serif: ['Frank Ruhl Libre', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .gold-gradient-bg {
            background: linear-gradient(135deg, #B4941F 0%, #D4AF37 50%, #FCD34D 100%);
        }
    </style>
</head>
<body class="bg-navy-900 text-gray-100 font-sans antialiased flex items-center justify-center min-h-screen p-6">

    <div class="max-w-xl w-full bg-navy-800 p-12 rounded-2xl shadow-2xl border border-white/10 text-center relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-gold-500/10 rounded-full blur-3xl"></div>

        <div class="w-20 h-20 bg-gold-500/20 rounded-full flex items-center justify-center mx-auto mb-8 border border-gold-500/50">
            <i class="fas fa-check text-4xl text-gold-500"></i>
        </div>

        <h1 class="text-4xl font-serif font-bold mb-4 text-white">תודה על רכישתך!</h1>
        <p class="text-xl text-gray-300 mb-8 font-light leading-relaxed">
            הזמנת הספר <span class="text-gold-400 font-medium">"לכתוב את חייך מחדש"</span> התקבלה בהצלחה. 
            <br> אישור הזמנה יישלח אליך למייל ברגעים אלו.
        </p>

        <div class="space-y-4">
            <p class="text-sm text-gray-400 border-t border-white/10 pt-6 mb-6">
                אנו ניצור איתך קשר בהקדם לאיסוף.
            </p>
            
            <a href="index.html" class="inline-block px-8 py-3 border border-gold-500 text-gold-500 hover:bg-gold-500 hover:text-navy-900 transition duration-300 rounded-lg font-medium">
                חזרה לאתר
            </a>
        </div>

        <p class="mt-12 text-xs text-gray-500 italic">
            "אל תשאיר את העתיד שלך בידי המקרה"
        </p>
    </div>

</body>
</html>
